indexpage:
  title: AI Data Engine documentation
  lead: "NetApp AI Data Engine (AIDE) is an enterprise-grade platform designed to accelerate and simplify AI-driven data processing, management, and governance. AIDE transforms unstructured data into structured, AI-ready datasets for machine learning and generative AI workloads."
  summary: "AI Data Engine documentation provides comprehensive information about installing, configuring, and managing AIDE systems, including metadata cataloging, workspace management, data collections, and integration with AI/ML workflows."
  keywords: aide, ai data engine, ontap, metadata engine, workspaces, data collections, vector database, guardrails, dcn, data compute nodes
